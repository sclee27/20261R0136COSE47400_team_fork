# =====================================================================
# Teacher-model training config (trains teacher/bbox_evaluator.py on SDS).
# Every value here is an editable knob. Override on the CLI with
# dotted keys, e.g.  mode=original  label.iou_pos=0.4  train.lr=0.005
# =====================================================================

image_size: 640            # square letterbox size fed to the backbone

# mode selects the box SAMPLER the dataset uses:
#   original     -> stride sampler (legacy uniform anchors)
#   jittering    -> GT-linked jitter sampler
#   jittering_v2 -> GT-linked jitter sampler, center-overlap variant
mode: jittering            # original | jittering | jittering_v2

# -- shared sampling blocks (same schema as sampling/config.py) --------
levels:
  # enabled = level names kept. Dropping a P-level removes those boxes
  # from training (EDA showed P3/P4/P5 hold ~no SDS objects).
  enabled: [orig, p1, p2]
  # level name -> shorter-side upper bound (px) that defines the level.
  # KEEP THESE FIXED: bbox_evaluator._assign_levels hardcodes these same
  # thresholds, so changing them here would misroute boxes to the wrong head.
  upper_short: { orig: 20, p1: 40, p2: 80, p3: 160, p4: 320, p5: 640 }

jitter:                    # used by jittering / jittering_v2 modes
  scale: [0.7, 2.0]        # TUNABLE: box_short = GT_short * U(lo, hi)
  log: false               # true -> log-uniform scale draw
  pos_frac: 0.6            # TUNABLE: center offset = U(+/-pos_frac) * GT_size
  n_candidates: 20         # TUNABLE: candidate boxes generated per GT
                           # n_candidates 알고리즘 computation 생각해보기
stride:                    # used by original (stride) mode
  strides: [1, 2, 4, 8, 16, 32]
  n_short: 3               # short-side sizes per stride
  n_ratios: 2              # aspect ratios per size
  sig_scale: 4.0           # gaussian center-sampling spread

label:
  iou_pos: 0.2             # TUNABLE: IoU >= this -> positive box
  iou_neg: 0.0             # TUNABLE: IoU <  this -> background; between = ignore
  stratify_bins: 5         # IoU bins used to balance positives
  n_per_bin: 1             # max positives sampled per IoU bin
  #N_per_bin을 각 object에 대해?
data:
  ann_dir: data_sds/annotations
  split: train
  max_images: 0            # 0 -> all images
  seed: 0                  # fixes `jittering`; `original`/`jittering_v2` also use
                           # the legacy sampler's global np.random (not fully reproducible)

# -- validation --------------------------------------------------------
val:
  split: val
  max_images: 200          # cap val images (0 -> all)

# -- dataset / IO ------------------------------------------------------
dataset:
  images_dir: data_sds/images   # images at <images_dir>/<split>/<file_name>
  pad_value: 114                # letterbox pad color (yolo grey)
  stratify: true                # balance positives by IoU bins (label.*)
  num_classes: 5                # FOREGROUND classes; evaluator gets +1 for background

# -- frozen backbone ---------------------------------------------------
backbone:
  # PLACEHOLDER default = plain COCO yolov8m.pt (NOT fine-tuned). Replace with
  # your MS-COCO-pretrained + SDS-fine-tuned best.pt on the GPU box.
  weights: experiments/weights/yolov8m.pt
  scale: m                                   # yolov8 scale tag
  cfg: cfg/yolov8.yaml                       # architecture yaml
  freeze: true                               # freeze backbone during training

# -- optimization ------------------------------------------------------
train:
  epochs: 50               # MAX epochs (early stopping may end sooner)
  patience: 8              # stop if val-acc doesn't improve for this many epochs (0 = off)
  batch_size: 1            # per-image (variable #boxes per image)
  lr: 0.001
  weight_decay: 0.0005
  optimizer: adamw         # adamw | sgd
  momentum: 0.9            # SGD momentum (ignored by adamw)
  device: auto             # auto | cpu | cuda | cuda:0
  amp: false               # mixed precision off: the ROI evaluator's logit buffer
                           # is float32 and isn't autocast-safe (half/float mismatch)
  num_workers: 4
  out_dir: teacher/runs    # outputs -> <out_dir>/<exp_name>
  exp_name: teacher_jittering_orig-p1-p2
  log_every: 50            # log every N steps
  seed: 0
